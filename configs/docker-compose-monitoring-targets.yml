services:
  # HTTP/HTTPS Web Servers
  nginx-web:
    image: nginx:alpine
    container_name: monitoring-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx-html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # DNS Server
  dns-server:
    image: coredns/coredns:latest
    container_name: monitoring-dns
    ports:
      - "15353:53/udp"
      - "15353:53/tcp"
    volumes:
      - ./coredns:/etc/coredns:ro
    command: -conf /etc/coredns/Corefile
    restart: unless-stopped

  # FTP Server
  ftp-server:
    image: stilliard/pure-ftpd:latest
    container_name: monitoring-ftp
    ports:
      - "21:21"
      - "30000-30009:30000-30009"  # Passive mode ports
    environment:
      PUBLICHOST: localhost
      FTP_USER_NAME: testuser
      FTP_USER_PASS: testpass
      FTP_USER_HOME: /home/testuser
    restart: unless-stopped

  # MariaDB Database
  mariadb:
    image: mariadb:latest
    container_name: monitoring-mariadb
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mariapass
      MYSQL_DATABASE: testdb
      MYSQL_USER: mariauser
      MYSQL_PASSWORD: mariapass
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: monitoring-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: mongopass
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # HAProxy Load Balancer
  haproxy:
    image: haproxy:latest
    container_name: monitoring-haproxy
    ports:
      - "8082:80"       # HAProxy frontend
      - "8404:8404"     # Stats page
    volumes:
      - ./haproxy:/usr/local/etc/haproxy:ro
    command: haproxy -f /usr/local/etc/haproxy/haproxy.cfg
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8404/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - nginx-web

volumes:
  mariadb-data:
  mongodb-data:

networks:
  default:
    name: icinga-playground
    external: true
