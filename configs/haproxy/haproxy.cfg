global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Stats page configuration
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats realm HAProxy\ Statistics
    stats auth admin:haproxypass
    stats admin if TRUE

# Frontend configuration
frontend http_front
    bind *:80
    default_backend http_back

# Backend configuration (using nginx as backend)
backend http_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server nginx monitoring-nginx:80 check inter 5s fall 3 rise 2
